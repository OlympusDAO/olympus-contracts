name: pnpm CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Detect test secrets
        id: detect_secrets
        run: |
          if [ -n "${{ secrets.ALCHEMY_API_KEY }}" ]; then
            echo "has_alchemy_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alchemy_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run test
        if: steps.detect_secrets.outputs.has_alchemy_key == 'true'
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: pnpm run test

      - name: Run compile fallback
        if: steps.detect_secrets.outputs.has_alchemy_key != 'true'
        run: pnpm run compile
